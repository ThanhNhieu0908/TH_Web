<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Lab8_Bai3_json</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        max-width: 600px;
        margin: 0 auto;
        font-size: 20px;
        text-align: center;
      }
      h2 {
        color: aliceblue;
        margin-top: 20px;
        padding: 10px;
        background-color: green;
        text-align: center;
        border-radius: 10px 10px 0 0;
        border-bottom: 1px solid;
      }
      #userinfo {
        color: black;
        background-color: lightgreen;
        padding: 20px;
        text-align: left;
        /* Thêm dòng này để mặc định ẩn thông tin khi vừa chạy trang */
        display: none;
      }
      #btn_submit_hien {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        background-color: green;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }
      #btn_submit_an {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        background-color: lightcoral;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>THÔNG TIN USER</h2>
    <div id="userinfo">
      <p>Họ và tên: Đào Thanh Nhiều</p>
      <p>Năm sinh: 2005</p>
      <p>Email: thanhnhieu09082005@gmail.com</p>
      <p>
        Địa chỉ: 98/101 Bùi Văn Ba, Phường Tân Thuận, quận 7, Tp.Hồ chí minh
      </p>
    </div>
    <button id="btn_submit_hien">Hiện thông tin</button>
    <button id="btn_submit_an">Ẩn thông tin</button>

    <!-- Đoạn JavaScript xử lý chức năng Ẩn / Hiện -->
    <script>
      // Lấy các phần tử HTML thông qua ID
      const userInfo = document.getElementById("userinfo");
      const btnHien = document.getElementById("btn_submit_hien");
      const btnAn = document.getElementById("btn_submit_an");

      // Xử lý sự kiện khi click vào nút "Hiện thông tin"
      btnHien.addEventListener("click", function () {
        userInfo.style.display = "block"; // Hiện khung thông tin
      });

      // Xử lý sự kiện khi click vào nút "Ẩn thông tin"
      btnAn.addEventListener("click", function () {
        userInfo.style.display = "none"; // Ẩn khung thông tin
      });
    </script>
  </body>
</html>
