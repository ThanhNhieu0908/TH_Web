<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Image Slider</title>
    <style>
      body {
        font-family: sans-serif;
      }
      img {
        vertical-align: middle;
        width: 100%;
      }
      .slideshow-container {
        max-width: 1000px;
        position: relative;
        margin: auto;
      }
      /* Hide slides by default */
      .mySlides {
        display: none;
      }
      .prev, .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        width: auto;
        padding: 16px;
        margin-top: -22px;
        color: white;
        font-weight: bold;
        font-size: 18px;
        transition: 0.6s ease;
        border-radius: 0 3px 3px 0;
        user-select: none;
        background-color: red; /* Kept your original styling */
      }
      .next {
        right: 0;
        border-radius: 3px 0 0 3px;
      }
      .prev:hover, .next:hover {
        background-color: rgba(0, 0, 0, 0.8);
      }
      .text {
        color: #f2f2f2;
        font-size: 15px;
        padding: 8px 12px;
        position: absolute;
        bottom: 8px;
        width: 100%;
        text-align: center;
        background-color: rgba(0,0,0,0.5);
      }
      .dot-container {
        text-align: center;
        padding: 20px;
      }
      .dot {
        display: inline-block;
        border-radius: 100%;
        width: 20px;
        height: 20px;
        background-color: #999;
        cursor: pointer;
        margin: 0 4px;
      }
      .dot:hover, .dot.active {
        background-color: #333;
      }
      /* Fading animation */
      .fade {
        animation-name: fade;
        animation-duration: 1.5s;
      }
      @keyframes fade {
        from {opacity: .4} 
        to {opacity: 1}
      }
    </style>
</head>
<body>

    <div class="slideshow-container">
      <!-- Slide 1 -->
      <div class="mySlides fade">
        <img src="https://picsum.photos/id/1015/1000/400" alt="Nature">
        <div class="text">Caption Text 1</div>
      </div>

      <!-- Slide 2 -->
      <div class="mySlides fade">
        <img src="https://picsum.photos/id/1016/1000/400" alt="Mountains">
        <div class="text">Caption Text 2</div>
      </div>

      <!-- Slide 3 -->
      <div class="mySlides fade">
        <img src="https://picsum.photos/id/1018/1000/400" alt="Forest">
        <div class="text">Caption Text 3</div>
      </div>

      <!-- Navigation Arrows -->
      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <!-- Navigation Dots -->
    <div class="dot-container">
      <span class="dot" onclick="currentSlide(1)"></span> 
      <span class="dot" onclick="currentSlide(2)"></span> 
      <span class="dot" onclick="currentSlide(3)"></span> 
    </div>

    <script>
      let slideIndex = 1;
      showSlides(slideIndex);

      // Next/previous controls
      function plusSlides(n) {
        showSlides(slideIndex += n);
      }

      // Dot controls
      function currentSlide(n) {
        showSlides(slideIndex = n);
      }

      function showSlides(n) {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        let dots = document.getElementsByClassName("dot");
        
        // Loop back to the beginning or end
        if (n > slides.length) {slideIndex = 1}    
        if (n < 1) {slideIndex = slides.length}
        
        // Hide all slides
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";  
        }
        
        // Remove "active" class from all dots
        for (i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active", "");
        }
        
        // Show current slide and highlight current dot
        slides[slideIndex-1].style.display = "block";  
        dots[slideIndex-1].className += " active";
      }
    </script>

</body>
</html>
